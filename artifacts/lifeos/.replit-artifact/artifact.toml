kind = "web"
previewPath = "/"
title = "LifeOS"
version = "1.0.0"
id = "artifacts/lifeos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25109

[services.development]
run = "pnpm --filter @workspace/lifeos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lifeos", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lifeos", "run", "start" ]

[services.env]
PORT = "25109"
BASE_PATH = "/"
